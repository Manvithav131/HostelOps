version: "3.8"

services:
  backend:
    build: ./backend
    container_name: hostelops-backend
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    expose:
      - "5000"
    restart: always

  frontend:
    build: ./frontend
    container_name: hostelops-frontend
    expose:
      - "80"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: hostelops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: always